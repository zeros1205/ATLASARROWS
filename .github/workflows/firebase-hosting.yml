name: Firebase Hosting (promo site)

# Publishes the static promo/landing page in `site/` to Firebase Hosting.
#
# Manual dispatch only — same rule as every other workflow here: a push must
# never publish anything on its own. Run this by hand when you want the live
# site updated.
#
# Auth reuses the same FIREBASE_SERVICE_ACCOUNT_BASE64 secret as App
# Distribution (a base64-encoded service-account JSON). If it's missing the
# deploy is skipped, not failed. The Hosting site id and custom domain
# (atlasarrows.loganland.app) are attached once in the Firebase console; the
# site id must match `hosting.site` in firebase.json.
on:
  workflow_dispatch:

concurrency:
  group: firebase-hosting
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy site/ to Firebase Hosting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Firebase secret
        id: gate
        env:
          CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}
        run: |
          if [ -z "$CREDENTIALS" ]; then
            echo "::warning::FIREBASE_SERVICE_ACCOUNT_BASE64 is not set — skipping deploy."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      # Decode the service account and derive the project id from it, so no
      # separate FIREBASE_PROJECT_ID secret is needed. A stray BOM/CRLF in the
      # secret would corrupt the private-key PEM and surface as an auth error,
      # so validate it as JSON before using it.
      - name: Write Firebase credentials
        if: steps.gate.outputs.ready == 'true'
        id: creds
        run: |
          echo "${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/sa.json"
          project="$(python3 -c "import json; print(json.load(open('$RUNNER_TEMP/sa.json'))['project_id'])")" \
            || { echo "::error::Decoded FIREBASE_SERVICE_ACCOUNT_BASE64 is not valid JSON."; exit 1; }
          echo "project=$project" >> "$GITHUB_OUTPUT"

      - name: Deploy
        if: steps.gate.outputs.ready == 'true'
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/sa.json
        run: |
          npx --yes firebase-tools@latest deploy \
            --only hosting \
            --project "${{ steps.creds.outputs.project }}" \
            --non-interactive
