name: CI

# Quality gate: dart analyze clean, all tests pass, the web build compiles.
# Mirrors the local gate documented in CLAUDE.md.
#
# Manual dispatch only. Every workflow in this repo is dispatch-only — nothing
# builds unless someone asks for it. The routine check is `dart analyze` and
# `flutter test` locally; run this when you want the web build verified too.
on:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Analyze, test, build web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ vars.FLUTTER_VERSION || '3.44.0' }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # `flutter analyze` crashes on the dev machine's path, so the project
      # standardised on `dart analyze` — keep CI on the same command.
      - name: Analyze
        run: dart analyze

      - name: Test
        run: flutter test

      - name: Build web
        run: flutter build web --release

      - name: Upload web build
        uses: actions/upload-artifact@v4
        with:
          name: web-${{ github.run_number }}
          path: build/web
          retention-days: 7
