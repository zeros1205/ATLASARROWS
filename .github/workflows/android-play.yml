name: Android · Play Console

# Builds a signed AAB and uploads it to Google Play.
#
# Triggers
#   - push of a tag  v*        → uploads to the `internal` track
#   - manual dispatch          → pick the track (internal / alpha / beta /
#                                production) and whether to only build
#
# Every store secret is optional at the job level: if signing or the Play
# service account isn't configured yet, the workflow still builds and uploads
# the AAB as a run artifact instead of failing red. See docs/RELEASE.md.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      track:
        description: Play track to publish to
        type: choice
        default: internal
        options: [internal, alpha, beta, production]
      status:
        description: Release status on that track
        type: choice
        default: draft
        options: [draft, completed]
      build_only:
        description: Build the AAB but skip the Play upload
        type: boolean
        default: false

concurrency:
  group: play-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build AAB and upload
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ vars.FLUTTER_VERSION || '3.44.0' }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Decode the release keystore from a secret into a file Gradle can read.
      # `has_signing` gates every later step so a repo without secrets still
      # produces a (debug-signed) build artifact for inspection.
      - name: Decode keystore
        id: signing
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::warning::ANDROID_KEYSTORE_BASE64 is not set — building unsigned. This build CANNOT be uploaded to Play."
            echo "has_signing=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"
          echo "has_signing=true" >> "$GITHUB_OUTPUT"

      - name: Build AAB
        env:
          ANDROID_KEYSTORE_PATH: ${{ steps.signing.outputs.has_signing == 'true' && format('{0}/release.jks', runner.temp) || '' }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        # The run number is the build number so Play always sees an increasing
        # versionCode; the version name still comes from pubspec.yaml.
        run: flutter build appbundle --release --build-number=${{ github.run_number }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: aab-${{ github.run_number }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Check Play credentials
        id: play
        env:
          SERVICE_ACCOUNT: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ -z "$SERVICE_ACCOUNT" ]; then
            echo "::warning::PLAY_SERVICE_ACCOUNT_JSON is not set — skipping the Play upload. The AAB is attached to this run."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Fail if a tagged release cannot be signed
        if: startsWith(github.ref, 'refs/tags/v') && steps.signing.outputs.has_signing != 'true'
        run: |
          echo "::error::A v* tag means a store release, but no signing keystore is configured."
          exit 1

      - name: Upload to Play
        if: >-
          steps.play.outputs.ready == 'true'
          && steps.signing.outputs.has_signing == 'true'
          && inputs.build_only != true
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.loganland.atlasarrows
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: ${{ inputs.track || 'internal' }}
          status: ${{ inputs.status || 'draft' }}
          mappingFile: build/app/outputs/mapping/release/mapping.txt
