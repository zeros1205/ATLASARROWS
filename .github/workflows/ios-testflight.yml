name: iOS · TestFlight

# Archives a signed IPA on a macOS runner and uploads it to TestFlight via the
# App Store Connect API.
#
# Triggers
#   - push of a tag  v*   → build + upload
#   - manual dispatch     → optionally build only
#
# Requires an Apple Developer Program membership. Without the signing secrets
# the job still runs `flutter build ios --no-codesign` so compile breakage is
# caught, then stops before archiving. See docs/RELEASE.md.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      build_only:
        description: Archive the IPA but skip the TestFlight upload
        type: boolean
        default: false

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Archive and upload to TestFlight
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ vars.FLUTTER_VERSION || '3.44.0' }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check signing secrets
        id: signing
        env:
          CERT: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$CERT" ] || [ -z "$PROFILE" ] || [ -z "$TEAM_ID" ]; then
            echo "::warning::iOS signing secrets are incomplete — compiling without code signing and skipping the archive."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      # Compile-only path: no secrets yet, but we still want to know the iOS
      # target builds before someone sets the account up.
      - name: Build (no code signing)
        if: steps.signing.outputs.ready != 'true'
        run: flutter build ios --release --no-codesign --build-number=${{ github.run_number }}

      - name: Fail if a tagged release cannot be signed
        if: startsWith(github.ref, 'refs/tags/v') && steps.signing.outputs.ready != 'true'
        run: |
          echo "::error::A v* tag means a store release, but the iOS signing secrets are not configured."
          exit 1

      - name: Import signing certificate and profile
        if: steps.signing.outputs.ready == 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_DIST_CERT_PASSWORD }}

      - name: Install provisioning profile
        if: steps.signing.outputs.ready == 'true'
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROFILE_BASE64" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/build.mobileprovision

      # Written at build time rather than committed, so the team id and profile
      # name stay in secrets instead of in the repo.
      - name: Write ExportOptions.plist
        if: steps.signing.outputs.ready == 'true'
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>${TEAM_ID}</string>
            <key>uploadSymbols</key><true/>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.loganland.atlasarrows</key><string>${PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          PLIST

      - name: Build IPA
        if: steps.signing.outputs.ready == 'true'
        run: |
          flutter build ipa --release \
            --build-number=${{ github.run_number }} \
            --export-options-plist="$RUNNER_TEMP/ExportOptions.plist"

      - name: Upload IPA artifact
        if: steps.signing.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ipa-${{ github.run_number }}
          path: build/ios/ipa/*.ipa
          retention-days: 30

      - name: Upload to TestFlight
        if: steps.signing.outputs.ready == 'true' && inputs.build_only != true
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: build/ios/ipa/atlas_arrows.ipa
          issuer-id: ${{ secrets.ASC_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_KEY_ID }}
          api-private-key: ${{ secrets.ASC_PRIVATE_KEY }}
