name: z_arrows
description: "Z-Arrows — Shift the Arrows, Clear the Maze."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.18.0
  flame_audio: ^2.1.0
  shared_preferences: ^2.5.5
  google_mobile_ads: ^9.0.0
  in_app_purchase: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/shapes/
    - assets/images/icons/

# Source PNGs are drawn by tools/gen_icon.py from the ZTheme palette.
# Regenerate with: dart run flutter_launcher_icons
flutter_launcher_icons:
  image_path: assets/icon/icon.png
  android: true
  adaptive_icon_background: "#F7F6F2"
  adaptive_icon_foreground: assets/icon/icon_fg.png
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/icon/icon.png
    background_color: "#F7F6F2"
    theme_color: "#F7F6F2"

# Regenerate with: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#F7F6F2"
  image: assets/icon/splash.png
  android_12:
    color: "#F7F6F2"
    image: assets/icon/splash.png
