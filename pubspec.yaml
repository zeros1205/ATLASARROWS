name: atlas_arrows
description: "Atlas Arrows — Shift the Arrows, Clear the Maze."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flame: ^1.18.0
  flame_audio: ^2.1.0
  shared_preferences: ^2.5.5
  google_mobile_ads: ^9.0.0
  in_app_purchase: ^3.3.0
  games_services: ^5.1.0
  firebase_core: ^4.12.1
  firebase_auth: ^6.5.6
  # LOGAN LAND cold-start brand sequence.
  #
  # ⚠️ VENDORED COPY. The source of truth is zeros1205/loganland_flutter_kit at
  # tag v1.0.0; this is a checkout of packages/loganland_boot from it. It lives
  # here because that repo is private and CI cannot clone it without a token.
  # Do not edit anything under packages/loganland_boot — fix it in the kit, tag
  # a release, and re-copy, or the publisher identity forks per app, which is
  # the exact thing the kit exists to prevent.
  loganland_boot:
    path: packages/loganland_boot
  firebase_storage: ^13.4.5
  path_provider: ^2.1.6
  archive: ^4.0.9
  crypto: ^3.0.7
  package_info_plus: ^8.1.0
  # Offline SVG national flags rendered from ISO codes for the round-intro
  # splash. Android ships no flag-emoji glyphs, so the emoji would show as
  # letters ("FR") — this draws the real flag instead.
  country_flags: ^4.1.2
  # Crash + error reporting. The DSN is injected at build time
  # (--dart-define=SENTRY_DSN); with no DSN it initializes as a no-op. A range
  # rather than a caret so pub can pick a build whose transitive deps
  # (package_info_plus, etc.) line up with the rest of the app.
  sentry_flutter: ">=8.0.0 <10.0.0"

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6
  # test/app_icon_test.dart decodes the adaptive plate. It arrives transitively
  # via flutter_launcher_icons; named here so the test does not break the day
  # that dependency drops it.
  image: ^4.5.4

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/shapes/
    - assets/images/brand/
    - assets/images/icons/
    # assets/images/stamps/ is deliberately NOT here. The masters are 216
    # 1024px PNGs — 419 MB — and even re-encoded the set does not belong in the
    # APK. It ships from Firebase Storage a continent at a time; see
    # lib/services/stamp_store.dart and tools/atlas/build_stamp_packs.py.
    # Only the manifest (a couple of KB, under assets/campaign/) is bundled.
    - assets/campaign/
  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
          weight: 400
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
        - asset: assets/fonts/Outfit-ExtraBold.ttf
          weight: 800
    - family: Paperlogy
      fonts:
        - asset: assets/fonts/Paperlogy-Regular.ttf
          weight: 400
        - asset: assets/fonts/Paperlogy-Bold.ttf
          weight: 700
        - asset: assets/fonts/Paperlogy-ExtraBold.ttf
          weight: 800
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700

# Source PNGs and platform icon exports are drawn by tools/icon/build_icon.py.
# Regenerate with: python tools/icon/build_icon.py
flutter_launcher_icons:
  image_path: assets/icon/icon.png
  android: true
  adaptive_icon_background: "#F7F6F2"
  adaptive_icon_foreground: assets/icon/icon_fg.png
  ios: true
  remove_alpha_ios: true
  web:
    generate: true
    image_path: assets/icon/icon.png
    background_color: "#F7F6F2"
    theme_color: "#F7F6F2"

# ── Native splash ─────────────────────────────────────────────────────
# LOGAN LAND boot kit §5. Off-black (#0D0D0D) flat screen, matching the
# publisher card Flutter draws next so there is no seam between them.
# Android 12+ forces an icon onto the system splash, so there is no way to
# ask for a genuinely blank screen — the icon is a dot in the *same*
# #0D0D0D, which makes it invisible.
# Regenerate with: dart run flutter_native_splash:create
# ⚠️ After regenerating, re-apply the hand patch in android/app/src/main/res/
#    values*/styles.xml: NormalTheme's windowBackground must be @color/splash_ink,
#    not ?android:colorBackground — otherwise a white frame flashes between the
#    native splash and Flutter's first frame.
flutter_native_splash:
  color: "#0D0D0D"
  color_dark: "#0D0D0D"
  image: assets/icon/splash_dot.png
  image_dark: assets/icon/splash_dot.png
  android: true
  ios: true
  web: false
  android_12:
    image: assets/icon/splash_dot.png
    image_dark: assets/icon/splash_dot.png
    icon_background_color: "#0D0D0D"
    icon_background_color_dark: "#0D0D0D"
