<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Z-ARROWS Board Shape Gallery</title>
  <style>
    :root { color-scheme: dark; --bg:#070a10; --panel:#111827; --panel2:#172033; --text:#eef5ff; --muted:#9aa8bd; --line:#2a3548; --dot:#263246; --on:#66e3ff; --edge:#ffd45a; --core:#ff65b7; --ok:#7cf2bd; }
    * { box-sizing: border-box; }
    body { margin:0; background:radial-gradient(circle at 18% 0%, rgba(102,227,255,.16), transparent 30%), var(--bg); color:var(--text); font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; }
    header { padding:24px clamp(14px,4vw,36px) 16px; border-bottom:1px solid var(--line); background:rgba(7,10,16,.9); position:sticky; top:0; z-index:5; backdrop-filter:blur(14px); }
    h1 { margin:0 0 8px; font-size:clamp(23px,4vw,38px); letter-spacing:0; }
    .lead { margin:0; color:var(--muted); line-height:1.55; max-width:1050px; }
    .toolbar { display:grid; grid-template-columns:minmax(180px,1fr) repeat(4,minmax(116px,160px)); gap:10px; margin-top:16px; align-items:end; }
    label { display:grid; gap:6px; color:var(--muted); font-size:12px; font-weight:700; }
    input, select, button { min-height:38px; border:1px solid var(--line); border-radius:8px; background:var(--panel2); color:var(--text); padding:0 11px; font:inherit; }
    button { cursor:pointer; background:linear-gradient(135deg, rgba(102,227,255,.18), rgba(124,242,189,.10)); }
    main { padding:18px clamp(14px,4vw,36px) 36px; }
    .stats { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; color:var(--muted); font-size:13px; }
    .stat { border:1px solid var(--line); background:rgba(17,24,39,.72); border-radius:8px; padding:7px 9px; }
    .stat strong { color:var(--text); }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(188px,1fr)); gap:12px; }
    .card { border:1px solid var(--line); background:linear-gradient(180deg, rgba(23,32,51,.92), rgba(10,14,22,.96)); border-radius:10px; padding:10px; min-width:0; }
    .head { display:flex; justify-content:space-between; gap:8px; margin-bottom:8px; align-items:start; }
    .title { min-width:0; }
    .title b { display:block; font-size:13px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .title span { color:var(--muted); font-size:11px; }
    .badge { flex:0 0 auto; border:1px solid var(--line); border-radius:999px; color:var(--muted); padding:2px 7px; font-size:11px; }
    .board { display:grid; place-items:center; min-height:150px; border:1px solid rgba(255,255,255,.055); border-radius:8px; background:repeating-linear-gradient(45deg, rgba(255,255,255,.018) 0 8px, rgba(255,255,255,.006) 8px 16px); margin-bottom:8px; }
    .dots { display:grid; grid-template-columns:repeat(13, 7px); gap:3px; padding:7px; }
    .dot { width:7px; height:7px; border-radius:50%; background:var(--dot); opacity:.42; }
    .dot.on { background:var(--on); opacity:1; box-shadow:0 0 7px rgba(102,227,255,.48); }
    .dot.edge { background:var(--edge); box-shadow:0 0 7px rgba(255,212,90,.42); }
    .dot.core { background:var(--core); box-shadow:0 0 7px rgba(255,101,183,.34); }
    .meta { display:grid; gap:5px; color:var(--muted); font-size:11px; line-height:1.42; }
    .meta strong { color:var(--text); }
    .pager { display:flex; justify-content:center; align-items:center; gap:10px; margin-top:18px; }
    .empty { grid-column:1/-1; border:1px dashed var(--line); border-radius:10px; color:var(--muted); text-align:center; padding:36px 14px; }
    @media (max-width:860px){ .toolbar{grid-template-columns:1fr 1fr;} }
    @media (max-width:520px){ header{position:static;} .toolbar{grid-template-columns:1fr;} .grid{grid-template-columns:repeat(auto-fill,minmax(158px,1fr));} .dots{grid-template-columns:repeat(13,6px); gap:3px;} .dot{width:6px;height:6px;} }
  </style>
</head>
<body>
  <header>
    <h1>Z-ARROWS 보드 형상 갤러리</h1>
    <p class="lead">2,000개 아이디어를 18x13 점 그리드 실루엣으로 보는 후보 검토용 화면입니다. 권장 size와 목표 #은 메타정보로 남기고, 미리보기는 형태 판독을 우선합니다.</p>
    <div class="toolbar">
      <label>검색 <input id="q" type="search" placeholder="원, 직각삼각형, 네온, 회로"></label>
      <label>서비스 메타포 <select id="metaphor"></select></label>
      <label>mask category <select id="category"></select></label>
      <label>난이도 <select id="difficulty"><option value="all">전체</option><option value="normal">normal</option><option value="boss">boss</option></select></label>
      <label>보기 개수 <select id="pageSize"><option selected>20</option><option>40</option><option>80</option><option>160</option></select></label>
    </div>
  </header>
  <main>
    <div id="stats" class="stats"></div>
    <section id="gallery" class="grid" aria-live="polite"></section>
    <div class="pager"><button id="prev" type="button">이전</button><span id="pageInfo" class="stat"></span><button id="next" type="button">다음</button></div>
  </main>

  if(/정삼각형/.test(idea)) return y>.58 ? false : y>-.76 && ax < (y+.88)*.58;
  if(/역삼각형/.test(idea)) return y<-.58 ? false : y<.76 && ax < (.88-y)*.58;
  if(/마름모/.test(idea)) return ax*.95+ay*.72<.72;
  if(/사다리꼴/.test(idea)) return y>-.66&&y<.66&&ax<(.40+(y+1)*.22);
  if(/평행사변형/.test(idea)) return ay<.58&&Math.abs(x-y*.36)<.62;
  if(/하트|heart/.test(idea)) return (Math.pow(x*x+(y+.08)*(y+.08)-.46,3)-x*x*(y+.08)*(y+.08)*(y+.08))<0;
  if(/별|star/.test(idea)) { const a=Math.atan2(y,x), rad=Math.hypot(x,y); return rad < .36 + .22*Math.cos(5*a); }
  if(/달|moon/.test(idea)) return x*x+y*y*.72<.62 && !((x+.26)*(x+.26)+y*y*.72<.50);
  if(/번개|lightning/.test(idea)) return Math.abs(x + y*.35) < .22 && y<.72 && y>-.72 || (x>.0&&x<.48&&y>.0&&y<.78);
  if(/열쇠|key/.test(idea)) return ((x+.34)*(x+.34)+y*y*1.6<.14) || (Math.abs(y)<.12&&x>-0.22&&x<.72) || (x>.42&&Math.abs(y-.22)<.11);
  if(/왕관|crown/.test(idea)) return (y>.1&&y<.54&&ax<.72) || (y<.2&&y>- .62&&(Math.abs(x)<.16 || Math.abs(x-.52)<.13 || Math.abs(x+.52)<.13));
  if(/화살|arrow|Z|z_/.test(idea)) return Math.abs(y+x*.55)<.20 || (x>.28&&Math.abs(y)<.42&&ax+y*.2<.9);
  if(/회로|기판|배선|네온|라인|레일|노선|도로|교차로/.test(idea)) return (Math.abs(x)<.18&&ay<.78)||(Math.abs(y)<.18&&ax<.82)||(Math.abs(y+x*.7)<.13&&ax<.82);
  if(/물|강|해류|바람|구름|흐름|파도|소용돌이/.test(idea)) return x*x*.75+y*y*.66 + Math.sin(x*5.2+y*2.8+seed)*.055 < .66;
  if(/집|로켓|우산|컵|병|선인장|풍선|상자|카메라|책/.test(idea)) return (ax<.56&&y>-.2&&y<.68)||(y<-.18&&y>-.72&&ax<(.16+(y+.72)*.8));
  if(/고양이|토끼|새|물고기|나비|강아지|고래/.test(idea)) return (x*x*1.05+y*y*.72<.52)||((x+.46)*(x+.46)*2.4+(y+.02)*(y+.02)*2.5<.22)||((x-.54)*(x-.54)*4+(y-.08)*(y-.08)*5<.12);
  if(item.category==='geometric') return (ax<.72&&ay<.54) || (ax*.9+ay*.62<.7);
  if(item.category==='organic') return x*x*.82+y*y*.62+Math.sin(x*3.4+y*4.1+seed)*.045<.62;
  if(item.category==='symbol') return ax*.86+ay*.62<.68 || (Math.sin((x-y)*6+seed)>.74&&ay<.72);
  if(item.category==='animal') return (x*x*1.08+y*y*.72<.54)||((x+.48)*(x+.48)*2.8+(y+.05)*(y+.05)*2.8<.18);
  if(item.category==='object') return (ax<.58&&ay<.62)||(y<-.44&&ax<.34);
  if(item.category==='season') return ax*(.85+Math.max(0,y)*.4)+ay*.72<.7;
  if(item.category==='brand') return Math.abs(y+x*.62)<.18 || Math.abs(y-x*.45)<.14 || (ay>.58&&ax<.78);
  return ax<.65&&ay<.56;
}
function smooth(mask){
  const out=mask.map(row=>row.slice());
  for(let r=1;r<ROWS-1;r++) for(let c=1;c<COLS-1;c++){
    let n=0; for(const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]) if(mask[r+dr][c+dc]) n++;
    if(mask[r][c]&&n===0) out[r][c]=false;
    if(!mask[r][c]&&n>=3) out[r][c]=true;
  }
  return out;
}
function makeMask(item){
  let mask=Array.from({length:ROWS},(_,r)=>Array.from({length:COLS},(_,c)=>baseShape(item,r,c)));
  mask=smooth(mask);
  const count=mask.flat().filter(Boolean).length;
  if(count<70){
    const old=mask.map(row=>row.slice());
    for(let r=1;r<ROWS-1;r++) for(let c=1;c<COLS-1;c++) if(old[r][c]) for(const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]) mask[r+dr][c+dc]=true;
  }
  return mask;
}
function cls(mask,r,c){ if(!mask[r][c]) return 'dot'; let n=0; for(const [dr,dc] of [[-1,0],[1,0],[0,-1],[0,1]]) if(mask[r+dr]?.[c+dc]) n++; return n<=1?'dot on edge':n>=4?'dot on core':'dot on'; }
function filtered(){ const q=el.q.value.trim().toLowerCase(); return DATA.filter(d=>{ if(el.metaphor.value!=='all'&&d.metaphor!==el.metaphor.value)return false; if(el.category.value!=='all'&&d.category!==el.category.value)return false; if(el.difficulty.value!=='all'&&d.difficulty!==el.difficulty.value)return false; if(!q)return true; return [d.no,d.metaphor,d.category,d.idea,d.difficulty,d.size,d.board,d.flow,d.role,d.monetization].join(' ').toLowerCase().includes(q); }); }
function card(item){ const mask=makeMask(item); const dots=mask.map((row,r)=>row.map((_,c)=>`<span class="${cls(mask,r,c)}"></span>`).join('')).join(''); return `<article class="card"><div class="head"><div class="title"><b>${item.no}. ${esc(item.idea)}</b><span>${esc(item.metaphor)} · ${esc(item.category)}</span></div><span class="badge">${item.difficulty}</span></div><div class="board"><div class="dots" aria-label="${esc(item.idea)} 점 그리드">${dots}</div></div><div class="meta"><div><strong>권장 ${esc(item.size)}</strong> · 목표 # ${item.cells}</div><div>${esc(item.flow)}</div><div>${esc(item.role)}</div></div></article>`; }
function render(){ const list=filtered(); const ps=Number(el.pageSize.value); const pages=Math.max(1,Math.ceil(list.length/ps)); state.page=Math.min(Math.max(1,state.page),pages); const items=list.slice((state.page-1)*ps,state.page*ps); el.stats.innerHTML=`<span class="stat"><strong>${list.length.toLocaleString('ko-KR')}</strong>개 표시 대상</span><span class="stat">전체 <strong>${DATA.length.toLocaleString('ko-KR')}</strong>개</span><span class="stat">현재 <strong>${items.length}</strong>개 렌더링</span><span class="stat">프리뷰 그리드 <strong>18x13</strong></span>`; el.gallery.innerHTML=items.length?items.map(card).join(''):'<div class="empty">조건에 맞는 보드가 없습니다.</div>'; el.pageInfo.textContent=`${state.page} / ${pages}`; el.prev.disabled=state.page<=1; el.next.disabled=state.page>=pages; }
fill(el.metaphor, uniq('metaphor'), '전체'); fill(el.category, uniq('category'), '전체');
[el.q,el.metaphor,el.category,el.difficulty,el.pageSize].forEach(n=>n.addEventListener('input',()=>{state.page=1;render();}));
el.prev.addEventListener('click',()=>{state.page--;render();}); el.next.addEventListener('click',()=>{state.page++;render();}); render();
</script>
