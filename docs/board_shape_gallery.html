<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Z-ARROWS Cat Mask Gallery</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f9fc;
      --card: #ffffff;
      --text: #0b1730;
      --muted: #667085;
      --line: #d9e1ee;
      --dot: #d7dee9;
      --on: #071637;
      --accent: #1497e8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    header {
      padding: 28px clamp(16px, 4vw, 44px) 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.92);
      position: sticky;
      top: 0;
      z-index: 2;
      backdrop-filter: blur(12px);
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 4vw, 38px);
      letter-spacing: 0;
    }
    .lead {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      max-width: 980px;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
      align-items: center;
    }
    input, button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font: inherit;
      padding: 0 12px;
    }
    input {
      min-width: min(420px, 100%);
      flex: 1;
    }
    button {
      cursor: pointer;
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }
    main {
      padding: 22px clamp(16px, 4vw, 44px) 42px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 14px;
      min-width: 0;
    }
    .head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: start;
      margin-bottom: 12px;
    }
    .title b {
      display: block;
      font-size: 16px;
    }
    .title span {
      color: var(--muted);
      font-size: 12px;
    }
    .badge {
      flex: 0 0 auto;
      color: var(--accent);
      border: 1px solid #b8ddf7;
      background: #eef8ff;
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: 700;
    }
    .board {
      display: grid;
      place-items: center;
      min-height: 236px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(90deg, rgba(20,151,232,.05) 1px, transparent 1px),
        linear-gradient(0deg, rgba(20,151,232,.05) 1px, transparent 1px),
        #fff;
      background-size: 18px 18px;
      margin-bottom: 12px;
    }
    .dots {
      display: grid;
      grid-template-columns: repeat(13, 10px);
      gap: 5px;
      padding: 10px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--dot);
      opacity: .55;
    }
    .dot.on {
      background: var(--on);
      opacity: 1;
      box-shadow: 0 0 0 2px rgba(7,22,55,.04);
    }
    .meta {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }
    details {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
    }
    pre {
      overflow: auto;
      margin: 8px 0 0;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f9fbff;
      color: var(--text);
      line-height: 1.2;
      font-size: 12px;
    }
    .empty {
      grid-column: 1 / -1;
      padding: 40px 16px;
      border: 1px dashed var(--line);
      border-radius: 10px;
      color: var(--muted);
      text-align: center;
    }
    @media (max-width: 540px) {
      header { position: static; }
      .grid { grid-template-columns: 1fr; }
      .dots { grid-template-columns: repeat(13, 8px); gap: 4px; }
      .dot { width: 8px; height: 8px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>고양이 보드 마스크</h1>
    <p class="lead">오브젝트 키워드를 먼저 정하고, 그 키워드에 맞는 18x13 마스크를 만든 뒤, 마스크 안을 점 그리드로 채운 화면입니다. 인식 가능한 형상만 후보로 남깁니다.</p>
    <div class="toolbar">
      <input id="query" type="search" placeholder="고양이 얼굴, 앉아있는 고양이, 서있는 고양이, 걸어가는 고양이">
      <button id="reset" type="button">전체 보기</button>
    </div>
  </header>
  <main>
    <section id="gallery" class="grid" aria-live="polite"></section>
  </main>
  <script>
    const masks = [
      {
        keyword: "고양이 얼굴",
        category: "cat-face",
        intent: "귀, 둥근 얼굴, 볼, 아래턱이 한눈에 읽히는 보스/상징형 보드",
        use: "초반 보상 레벨, 스킨팩 대표 이미지, 광고 소재 썸네일",
        rows: [
          "..##.....##..",
          ".####...####.",
          ".#####.#####.",
          ".###########.",
          "#############",
          "#############",
          "###.#####.###",
          "#############",
          "####.###.####",
          "###..###..###",
          "####.....####",
          ".###########.",
          "..#########..",
          "...#######...",
          "....#####....",
          ".............",
          ".............",
          "............."
        ]
      },
      {
        keyword: "앉아있는 고양이",
        category: "sitting-cat",
        intent: "귀, 등 곡선, 꼬리, 앉은 몸통이 구분되는 그림형 보드",
        use: "챕터 보스, 클리어 후 실루엣 공개, 컬렉션 보드",
        rows: [
          ".....##......",
          "....####.....",
          "...######....",
          "...######....",
          "....####.....",
          "...######....",
          "..########...",
          ".##########..",
          ".##########..",
          ".###########.",
          ".###########.",
          "..##########.",
          "...#########.",
          "....########.",
          ".....#######.",
          "......######.",
          "...#########.",
          "..########..."
        ]
      },
      {
        keyword: "서있는 고양이",
        category: "standing-cat",
        intent: "세로로 긴 몸, 머리, 네 다리, 곧은 꼬리를 읽게 하는 normal/boss 공용 보드",
        use: "중간 난이도, 세로 흐름이 강한 레벨, 하트/힌트 소모 구간",
        rows: [
          "....##.##....",
          "...#######...",
          "...#######...",
          "....#####....",
          "....#####....",
          "...#######...",
          "...#######...",
          "...#######...",
          "..#########..",
          "..#########..",
          "..#########..",
          "..#########..",
          "..###...###..",
          "..###...###..",
          "..###...###..",
          "..###...###..",
          ".####...####.",
          ".####...####."
        ]
      },
      {
        keyword: "걸어가는 고양이",
        category: "walking-cat",
        intent: "옆모습의 머리, 긴 등, 꼬리, 엇갈린 다리로 방향성을 주는 보드",
        use: "진행 방향을 암시하는 레벨, 광고 사이클용 normal 보드, 움직임 테마",
        rows: [
          ".............",
          ".............",
          ".........##..",
          "........####.",
          ".......######",
          "..###########",
          ".############",
          "############.",
          "###########..",
          ".#########...",
          "..####.###...",
          "..###..###...",
          ".###....###..",
          ".###.....###.",
          "####.....####",
          ".............",
          ".............",
          "............."
        ]
      }
    ];

    const gallery = document.getElementById("gallery");
    const query = document.getElementById("query");
    const reset = document.getElementById("reset");

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function renderMask(rows) {
      return rows.map((row) => row.split("").map((cell) => {
        const cls = cell === "#" ? "dot on" : "dot";
        return `<span class="${cls}"></span>`;
      }).join("")).join("");
    }

    function card(mask) {
      return `
        <article class="card">
          <div class="head">
            <div class="title">
              <b>${escapeHtml(mask.keyword)}</b>
              <span>18x13 / ${escapeHtml(mask.category)}</span>
            </div>
            <span class="badge">template</span>
          </div>
          <div class="board">
            <div class="dots" aria-label="${escapeHtml(mask.keyword)} 점 그리드">
              ${renderMask(mask.rows)}
            </div>
          </div>
          <div class="meta">
            <div>${escapeHtml(mask.intent)}</div>
            <div>${escapeHtml(mask.use)}</div>
          </div>
          <details>
            <summary>ASCII mask</summary>
            <pre>${escapeHtml(mask.rows.join("\n"))}</pre>
          </details>
        </article>
      `;
    }

    function render() {
      const term = query.value.trim().toLowerCase();
      const visible = masks.filter((mask) => {
        if (!term) return true;
        return [mask.keyword, mask.category, mask.intent, mask.use].join(" ").toLowerCase().includes(term);
      });
      gallery.innerHTML = visible.length
        ? visible.map(card).join("")
        : `<div class="empty">인식 가능한 마스크 템플릿이 없습니다. 먼저 키워드를 추가하고 마스크를 직접 설계해야 합니다.</div>`;
    }

    query.addEventListener("input", render);
    reset.addEventListener("click", () => {
      query.value = "";
      render();
    });
    render();
  </script>
</body>
</html>
